<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VM Admin</title>
    <link rel="apple-touch-icon" href="vm_tips_icon_1024_full_admin2.png">
    <link rel="apple-touch-icon" sizes="180x180" href="vm_tips_icon_1024_full_admin2.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VM Admin">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>VM 2026 Admin</h1>
            <input type="password" id="passwordInput" placeholder="Lösenord..." autofocus>
            <button id="loginBtn">Logga in</button>
            <p class="login-error hidden" id="loginError">Fel lösenord</p>
        </div>
    </div>

    <div id="adminContent" class="container hidden">
        <header class="header">
            <h1>VM 2026 Admin</h1>
            <button class="btn-logout" id="logoutBtn">Logga ut</button>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="results">Matcher</button>
            <button class="tab-btn" data-tab="medals">Medaljer</button>
            <button class="tab-btn" data-tab="players">Spelare</button>
        </nav>

        <main id="mainContent"></main>

        <div class="save-bar">
            <span class="save-status" id="saveStatus"></span>
            <button class="btn-save" id="saveBtn">Spara</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
